apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: safeway-kids
  labels:
    app: db-migration
    app.kubernetes.io/part-of: safeway-kids
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: safeway-kids-backend:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: safeway-kids-config
            - secretRef:
                name: safeway-kids-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
