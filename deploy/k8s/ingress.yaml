apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safeway-kids-ingress
  namespace: safeway-kids
  labels:
    app.kubernetes.io/part-of: safeway-kids
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - api.safeway-kids.kr
        - admin.safeway-kids.kr
        - safeway-kids.kr
      secretName: safeway-kids-tls
  rules:
    - host: api.safeway-kids.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
    - host: admin.safeway-kids.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
    - host: safeway-kids.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: site
                port:
                  number: 80
