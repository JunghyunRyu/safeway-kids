apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
  namespace: safeway-kids
  labels:
    app: site
    app.kubernetes.io/part-of: safeway-kids
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site
  template:
    metadata:
      labels:
        app: site
    spec:
      containers:
        - name: site
          image: safeway-kids-site:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: site
  namespace: safeway-kids
  labels:
    app: site
    app.kubernetes.io/part-of: safeway-kids
spec:
  type: ClusterIP
  selector:
    app: site
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
