name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: ruff check app/
      - name: Test
        working-directory: backend
        run: python -m pytest tests/ -q

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: mobile
        run: npm ci
      - name: TypeScript check
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Test
        working-directory: mobile
        run: npm test -- --passWithNoTests

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: web
        run: npm ci
      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit
      - name: Test
        working-directory: web
        run: npm test -- --passWithNoTests
      - name: Build
        working-directory: web
        run: npm run build

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: site
        run: npm ci
      - name: Build
        working-directory: site
        run: npm run build
